name: DM-002 Validation

on:
  push:
    branches: [main, master]
    paths:
      - "terraform/**"
      - "tests/**"
      - "data-products/**"
      - "data/**"
      - ".github/workflows/dm002-validation.yml"
  pull_request:
    paths:
      - "terraform/**"
      - "tests/**"
      - "data-products/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  terraform-static:
    name: Terraform Static Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
      - run: terraform fmt -check -recursive ../..
      - run: terraform init -input=false
      - run: terraform validate -no-color

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-static
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform apply -auto-approve -input=false -no-color

  aws-validation:
    name: AWS DM-002 Validation
    runs-on: ubuntu-latest
    needs: terraform-apply
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: terraform init
        working-directory: terraform/environments/dev
        run: terraform init -input=false
      - name: Run DM-002 tests with ingestion
        shell: pwsh
        run: ./tests/Run-DM002Tests.ps1 -SkipApply -RunIngestion
